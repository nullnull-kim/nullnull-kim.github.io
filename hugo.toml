baseURL = "https://nullnull-kim.com/"
theme = "PaperMod"
enableGitInfo = true
enableRobotsTXT = true
hasCJKLanguage = true
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false

[pagination]
  pagerSize = 10

[languages]
  [languages.ko]
    languageName = "한국어"
    languageCode = "ko"
    weight = 1
    title = "김태영"
    [languages.ko.params]
      description = "개발자 김태영의 기술 블로그 — Claude 활용기, LeetCode 풀이, 일상 기록"
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 2
    title = "Taeyoung Kim"
    [languages.en.params]
      description = "Developer Taeyoung Kim's tech blog — Claude tips, LeetCode solutions, and daily logs"
  [languages.ja]
    languageName = "日本語"
    languageCode = "ja"
    weight = 3
    title = "スズキ・タイエイ"
    [languages.ja.params]
      description = "開発者スズキ・タイエイの技術ブログ — Claude活用記、LeetCode解法、日常記録"
  [languages.zh]
    languageName = "中文"
    languageCode = "zh"
    weight = 4
    title = "金太永"
    [languages.zh.params]
      description = "开发者金太永的技术博客 — Claude使用技巧、LeetCode题解、日常记录"
  [languages.es]
    languageName = "Español"
    languageCode = "es"
    weight = 5
    title = "Taeyoung Kim"
    [languages.es.params]
      description = "Blog técnico del desarrollador Taeyoung Kim — consejos de Claude, soluciones LeetCode y registro diario"

[params]
  env = "production"
  author = "김태영"
  [params.assets]
    disableFingerprinting = true
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = false
  math = true

  [params.homeInfoParams]
    Title = "김태영"
    Content = "필사적으로 행복해지자"

  [params.schema]
    publisherType = "Person"
    sameAs = ["https://github.com/nullnull-kim"]

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nullnull-kim"

[menu]
  [[menu.main]]
    name = "Logs"
    url = "/logs/"
    weight = 10
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 20
  [[menu.main]]
    name = "Archive"
    url = "/archives/"
    weight = 30

[taxonomies]
  tag = "tags"

[permalinks]
  logs = "/logs/:year-:month-:day-:slug/"

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [["$$", "$$"]]
          inline = [["$", "$"]]

[outputs]
  home = ["HTML", "RSS", "JSON"]
